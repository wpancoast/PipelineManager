    /* ================================================================

       ================================================================ */
    function TodoPage({ tasks, setTasks, prospects, setProspects, isMobile }) {
      const [showAdd, setShowAdd] = useState(false);
      const today = toDateStr(new Date());
      const [newTask, setNewTask] = useState({ title: "", date: today, notes: "", priority: 2, prospectId: null });
      const [editingTaskId, setEditingTaskId] = useState(null);
      const [editTask, setEditTask] = useState({});
      const [confirmDeleteTask, setConfirmDeleteTask] = useState(null);
      const [dateFilter, setDateFilter] = useState("all");
      const [completionModal, setCompletionModal] = useState(null);
      const [completionNote, setCompletionNote] = useState("");
      const [addProspectMode, setAddProspectMode] = useState(false);
      const [newProspectName, setNewProspectName] = useState("");
      const [newProspectSector, setNewProspectSector] = useState("K-12");
      const sortedProspects = useMemo(() => [...prospects].sort((a, b) => a.name.localeCompare(b.name)), [prospects]);
      const sectors = [...new Set(prospects.map(p => p.sector).filter(Boolean))].sort();

      const displayDate = (t) => (!t.completed && t.date < today) ? today : t.date;

      const filteredTasks = useMemo(() => {
        let list = tasks;
        if (dateFilter === "today") list = list.filter(t => displayDate(t) === today);
        else if (dateFilter === "week") {
          const now = new Date();
          const weekEnd = new Date(now);
          weekEnd.setDate(weekEnd.getDate() + 7);
          list = list.filter(t => { const dd = displayDate(t); return dd >= today && dd <= toDateStr(weekEnd); });
        } else if (dateFilter === "completed") {
          list = list.filter(t => t.completed);
        }
        return [...list].sort((a, b) => {
          if (a.completed !== b.completed) return a.completed ? 1 : -1;
          const dd = displayDate(a).localeCompare(displayDate(b));
          if (dd !== 0) return dd;
          return (a.priority || 2) - (b.priority || 2) || a.id - b.id;
        });
      }, [tasks, dateFilter, today]);

      const grouped = useMemo(() => {
        const groups = {};
        filteredTasks.forEach(t => {
          const dd = displayDate(t);
          if (!groups[dd]) groups[dd] = [];
          groups[dd].push(t);
        });
        return groups;
      }, [filteredTasks]);

      const stats = useMemo(() => {
        const rolledToToday = tasks.filter(t => displayDate(t) === today);
        const rolledOver = tasks.filter(t => !t.completed && t.date < today);
        return {
          total: tasks.length,
          completed: tasks.filter(t => t.completed).length,
          todayTotal: rolledToToday.length,
          todayDone: rolledToToday.filter(t => t.completed).length,
          rolledOver: rolledOver.length
        };
      }, [tasks, today]);

      const addTask = () => {
        if (!newTask.title.trim()) return;
        const id = tasks.length > 0 ? Math.max(...tasks.map(t => t.id)) + 1 : 1;
        setTasks(prev => [...prev, { ...newTask, id, priority: newTask.priority || 2, completed: false, completedAt: null, prospectId: newTask.prospectId || null }]);
        setNewTask({ title: "", date: today, notes: "", priority: 2, prospectId: null });
        setShowAdd(false);
        setAddProspectMode(false);
        setNewProspectName("");
      };

      const addNewProspect = () => {
        if (!newProspectName.trim()) return;
        const npId = prospects.length > 0 ? Math.max(...prospects.map(p => p.id)) + 1 : 1;
        const np = { id: npId, name: newProspectName.trim(), sector: newProspectSector, address: "", phone: "", contact1: "", contact2: "", email1: "", email2: "", notes: [], lastContacted: null };
        setProspects(prev => [...prev, np]);
        setNewTask(prev => ({ ...prev, prospectId: npId }));
        setAddProspectMode(false);
        setNewProspectName("");
      };

      const [createProspectInModal, setCreateProspectInModal] = useState(false);
      const [modalNewProspect, setModalNewProspect] = useState({ name: "", sector: "K-12" });

      const toggleComplete = (id) => {
        const task = tasks.find(t => t.id === id);
        if (task && !task.completed) {
          if (task.prospectId) {
            const prospect = prospects.find(p => p.id === task.prospectId);
            if (prospect) {
              setCompletionModal({ taskId: id, prospectId: task.prospectId, prospectName: prospect.name, taskTitle: task.title, hasProspect: true });
              setCompletionNote("Completed: " + task.title);
              return;
            }
          }
          // No linked prospect — show modal with option to create one
          setCompletionModal({ taskId: id, prospectId: null, prospectName: null, taskTitle: task.title, hasProspect: false });
          setCompletionNote("");
          setCreateProspectInModal(false);
          setModalNewProspect({ name: "", sector: "K-12" });
          return;
        }
        setTasks(prev => prev.map(t => t.id === id ? { ...t, completed: !t.completed, completedAt: !t.completed ? new Date().toLocaleString() : null } : t));
      };

      const completeWithNote = () => {
        if (!completionModal) return;
        // If creating a new prospect from this modal
        if (createProspectInModal && modalNewProspect.name.trim()) {
          const npId = prospects.length > 0 ? Math.max(...prospects.map(p => p.id)) + 1 : 1;
          const noteObj = completionNote.trim() ? [{ id: Date.now(), text: completionNote.trim(), date: today, timestamp: new Date().toLocaleString() }] : [];
          const np = { id: npId, name: modalNewProspect.name.trim(), sector: modalNewProspect.sector, address: "", phone: "", contact1: "", contact2: "", email1: "", email2: "", extraContacts: [], notes: noteObj, lastContacted: today };
          setProspects(prev => [...prev, np]);
          setTasks(prev => prev.map(t => t.id === completionModal.taskId ? { ...t, completed: true, completedAt: new Date().toLocaleString(), prospectId: npId } : t));
        } else if (completionModal.hasProspect && completionNote.trim()) {
          // Existing prospect — add note
          setProspects(prev => prev.map(p => p.id === completionModal.prospectId ? {
            ...p,
            notes: [{ id: Date.now(), text: completionNote.trim(), date: today, timestamp: new Date().toLocaleString() }, ...p.notes],
            lastContacted: today
          } : p));
          setTasks(prev => prev.map(t => t.id === completionModal.taskId ? { ...t, completed: true, completedAt: new Date().toLocaleString() } : t));
        } else {
          setTasks(prev => prev.map(t => t.id === completionModal.taskId ? { ...t, completed: true, completedAt: new Date().toLocaleString() } : t));
        }
        setCompletionModal(null);
        setCompletionNote("");
        setCreateProspectInModal(false);
        setModalNewProspect({ name: "", sector: "K-12" });
      };

      const completeWithoutNote = () => {
        if (!completionModal) return;
        setTasks(prev => prev.map(t => t.id === completionModal.taskId ? { ...t, completed: true, completedAt: new Date().toLocaleString() } : t));
        setCompletionModal(null);
        setCompletionNote("");
        setCreateProspectInModal(false);
        setModalNewProspect({ name: "", sector: "K-12" });
      };

      const deleteTask = (id) => {
        setTasks(prev => prev.filter(t => t.id !== id));
        setConfirmDeleteTask(null);
      };

      const saveTaskEdit = () => {
        setTasks(prev => prev.map(t => t.id === editingTaskId ? { ...t, ...editTask } : t));
        setEditingTaskId(null);
        setEditTask({});
      };

      const dateColors = (dateStr) => {
        if (dateStr === today) return { bg: "#E8F5E9", label: "#2E7D32", border: "#C8E6C9" };
        if (dateStr < today) return { bg: "#F5F6F8", label: "#999", border: "#E0E0E0" };
        return { bg: "#F5F6F8", label: "#555", border: "#E0E0E0" };
      };

      const getProspectName = (pId) => { const p = prospects.find(pr => pr.id === pId); return p ? p.name : null; };

      return (
        <div>
          {/* Completion Note Modal */}
          {completionModal && (
            <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}>
              <div style={{ background: "#fff", borderRadius: 12, padding: isMobile ? 18 : 24, maxWidth: 500, width: "90%", boxShadow: "0 8px 30px rgba(0,0,0,0.2)", maxHeight: "85vh", overflowY: "auto" }}>
                <h3 style={{ fontSize: 16, fontWeight: 700, color: "#2196F3", marginBottom: 4 }}>Task Completed!</h3>
                {completionModal.hasProspect ? (
                  <div>
                    <p style={{ fontSize: 13, color: "#666", marginBottom: 12 }}>Add a note to <strong>{completionModal.prospectName}</strong>?</p>
                    <textarea value={completionNote} onChange={e => setCompletionNote(e.target.value)} rows={3} style={{ width: "100%", padding: "8px 12px", border: "1px solid #ddd", borderRadius: 8, fontSize: 14, marginBottom: 12, resize: "vertical", fontFamily: "inherit" }} />
                  </div>
                ) : (
                  <div>
                    <p style={{ fontSize: 13, color: "#666", marginBottom: 12 }}>
                      <strong>{completionModal.taskTitle}</strong> — would you like to create a prospect?
                    </p>
                    {!createProspectInModal ? (
                      <button onClick={() => setCreateProspectInModal(true)} style={{ padding: "8px 16px", background: "#EDE9FE", color: "#7C3AED", border: "1.5px solid #7C3AED", borderRadius: 6, cursor: "pointer", fontWeight: 600, fontSize: 13, marginBottom: 12, width: "100%" }}>+ Create a Prospect</button>
                    ) : (
                      <div style={{ background: "#EDE9FE", borderRadius: 8, padding: 14, marginBottom: 12 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, color: "#5B21B6", marginBottom: 8 }}>New Prospect</div>
                        <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 8, marginBottom: 8 }}>
                          <div><label style={{ fontSize: 11, color: "#666" }}>Name</label><input value={modalNewProspect.name} onChange={e => setModalNewProspect(p => ({ ...p, name: e.target.value }))} placeholder="Prospect name" style={inputStyle} /></div>
                          <div><label style={{ fontSize: 11, color: "#666" }}>Sector</label><select value={modalNewProspect.sector} onChange={e => setModalNewProspect(p => ({ ...p, sector: e.target.value }))} style={inputStyle}>

                          </select></div>
                        </div>
                        <div><label style={{ fontSize: 11, color: "#666" }}>Note (optional)</label><textarea value={completionNote} onChange={e => setCompletionNote(e.target.value)} rows={2} placeholder="Add an initial note for this prospect..." style={{ ...inputStyle, resize: "vertical" }} /></div>
                        <button onClick={() => { setCreateProspectInModal(false); setModalNewProspect({ name: "", sector: "K-12" }); }} style={{ marginTop: 8, padding: "4px 12px", fontSize: 11, background: "#fff", color: "#666", border: "1px solid #ddd", borderRadius: 4, cursor: "pointer" }}>Cancel</button>

            <div style={{ padding: isMobile ? "10px 12px" : "14px 16px", borderRadius: 10, background: stats.total > 0 ? "#E3F2FD" : "#fff", border: `1.5px solid ${stats.total > 0 ? "#BBDEFB" : "#E0E0E0"}` }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "#1565C0", marginBottom: 2 }}>Progress</div>
              <div style={{ fontSize: isMobile ? 18 : 22, fontWeight: 700, color: "#1565C0" }}>{stats.total > 0 ? Math.round((stats.completed / stats.total) * 100) : 0}%</div>
              <div style={{ width: "100%", height: 4, background: "#E0E0E0", borderRadius: 2, marginTop: 4 }}><div style={{ width: `${stats.total > 0 ? (stats.completed / stats.total) * 100 : 0}%`, height: 4, background: "#2196F3", borderRadius: 2, transition: "width 0.3s" }} /></div>
            </div>
          </div>

          {/* Controls */}
          <div style={{ display: "flex", gap: 6, marginBottom: isMobile ? 10 : 16, alignItems: "center", flexWrap: "wrap" }}>
            {[["all", "All"], ["today", "Today"], ["week", "Week"], ["completed", "Done"]].map(([key, label]) => (
              <button key={key} onClick={() => setDateFilter(key)} style={{ padding: isMobile ? "6px 10px" : "6px 14px", fontSize: isMobile ? 11 : 12, fontWeight: 500, background: dateFilter === key ? "#1a1a2e" : "#fff", color: dateFilter === key ? "#fff" : "#555", border: `1px solid ${dateFilter === key ? "#1a1a2e" : "#ddd"}`, borderRadius: 6, cursor: "pointer" }}>{label}{key === "completed" ? ` (${stats.completed})` : ""}</button>
            ))}
            <div style={{ flex: 1 }} />
            <button onClick={() => setShowAdd(!showAdd)} style={{ padding: isMobile ? "8px 12px" : "8px 16px", background: "#2196F3", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>+ Add</button>
          </div>

          {/* Add Task Form */}
          {showAdd && (
            <div style={{ background: "#fff", border: "2px solid #2196F3", borderRadius: 10, padding: 18, marginBottom: 16 }}>
              <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 12, color: "#1565C0" }}>New Task</div>
              <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 160px 100px", gap: 10, marginBottom: 10 }}>
                <div><label style={{ fontSize: 11, color: "#666" }}>Task</label><input value={newTask.title} onChange={e => setNewTask(p => ({ ...p, title: e.target.value }))} placeholder="What do you need to do?" style={inputStyle} onKeyDown={e => e.key === "Enter" && addTask()} /></div>
                <div style={isMobile ? { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 } : {}}><div><label style={{ fontSize: 11, color: "#666" }}>Date</label><input type="date" value={newTask.date} onChange={e => setNewTask(p => ({ ...p, date: e.target.value }))} style={inputStyle} /></div>
                {isMobile && <div><label style={{ fontSize: 11, color: "#666" }}>Priority</label><select value={newTask.priority} onChange={e => setNewTask(p => ({ ...p, priority: Number(e.target.value) }))} style={inputStyle}><option value={1}>1 - High</option><option value={2}>2 - Medium</option><option value={3}>3 - Low</option></select></div>}</div>
                {!isMobile && <div><label style={{ fontSize: 11, color: "#666" }}>Priority</label><select value={newTask.priority} onChange={e => setNewTask(p => ({ ...p, priority: Number(e.target.value) }))} style={inputStyle}><option value={1}>1 - High</option><option value={2}>2 - Medium</option><option value={3}>3 - Low</option></select></div>}
              </div>
              <div style={{ marginBottom: 12 }}><label style={{ fontSize: 11, color: "#666" }}>Notes (optional)</label><textarea value={newTask.notes} onChange={e => setNewTask(p => ({ ...p, notes: e.target.value }))} rows={2} placeholder="Any details, context, or reminders..." style={{ ...inputStyle, resize: "vertical" }} /></div>
              <div style={{ marginBottom: 12 }}>
                <label style={{ fontSize: 11, color: "#666" }}>Link to Prospect (optional)</label>
                <select value={newTask.prospectId || ""} onChange={e => { if (e.target.value === "__add__") { setAddProspectMode(true); setNewTask(p => ({ ...p, prospectId: null })); } else { setAddProspectMode(false); setNewTask(p => ({ ...p, prospectId: e.target.value ? Number(e.target.value) : null })); } }} style={{ ...inputStyle, color: newTask.prospectId ? "#1a1a2e" : "#999" }}>
                  <option value="">No Prospect</option>
                  {sortedProspects.map(p => <option key={p.id} value={p.id}>{p.name}{p.sector ? ` \u2014 ${p.sector}` : ""}</option>)}
                  <option value="__add__">+ Add a Prospect</option>
                </select>
                {addProspectMode && (
                  <div style={{ display: "flex", gap: 8, marginTop: 8, alignItems: "center", background: "#EDE9FE", borderRadius: 8, padding: 10 }}>
                    <input value={newProspectName} onChange={e => setNewProspectName(e.target.value)} placeholder="Prospect name..." onKeyDown={e => e.key === "Enter" && addNewProspect()} style={{ flex: 1, padding: "6px 10px", border: "1px solid #D1C4E9", borderRadius: 6, fontSize: 13 }} />
                    <select value={newProspectSector} onChange={e => setNewProspectSector(e.target.value)} style={{ padding: "6px 10px", border: "1px solid #D1C4E9", borderRadius: 6, fontSize: 13 }}>
                      {sectors.map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                    <button onClick={addNewProspect} style={{ padding: "6px 12px", background: "#7C3AED", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Add</button>
                    <button onClick={() => { setAddProspectMode(false); setNewProspectName(""); }} style={{ padding: "6px 12px", background: "#fff", border: "1px solid #ddd", borderRadius: 6, cursor: "pointer", fontSize: 12, color: "#666" }}>Cancel</button>
                  </div>
                )}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={addTask} disabled={!newTask.title.trim()} style={{ padding: "8px 20px", background: newTask.title.trim() ? "#2196F3" : "#ccc", color: "#fff", border: "none", borderRadius: 6, cursor: newTask.title.trim() ? "pointer" : "default", fontWeight: 600, fontSize: 13 }}>Add Task</button>
                <button onClick={() => { setShowAdd(false); setAddProspectMode(false); setNewProspectName(""); }} style={{ padding: "8px 20px", background: "#fff", color: "#666", border: "1px solid #ddd", borderRadius: 6, cursor: "pointer", fontSize: 13 }}>Cancel</button>
              </div>
            </div>
          )}

          {/* Task List */}
          {Object.keys(grouped).length === 0 && (
            <div style={{ background: "#fff", borderRadius: 10, border: "1px solid #e0e0e0", padding: 50, textAlign: "center" }}>
              <div style={{ fontSize: 16, color: "#999", marginBottom: 8 }}>No tasks yet</div>
              <div style={{ fontSize: 13, color: "#bbb" }}>Click "+ Add Task" to get started</div>
            </div>
          )}

          {Object.entries(grouped).map(([date, dateTasks]) => {
            const dc = dateColors(date);
            const incomplete = dateTasks.filter(t => !t.completed);
            const complete = dateTasks.filter(t => t.completed);
            const sorted = [...incomplete, ...complete];
            return (
              <div key={date} style={{ marginBottom: 16 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: dc.label, background: dc.bg, padding: "4px 12px", borderRadius: 6, border: `1px solid ${dc.border}` }}>
                    {isToday(date) ? "Today" : toDisplay(date)}
                  </span>
                  {isToday(date) && dateTasks.some(t => t.date < today && !t.completed) && <span style={{ fontSize: 11, color: "#F57F17", fontWeight: 500 }}>includes rolled-over tasks</span>}
                  <span style={{ fontSize: 11, color: "#999" }}>{complete.length}/{dateTasks.length} done</span>
                </div>
                <div style={{ background: "#fff", borderRadius: 10, border: `1px solid ${dc.border}`, overflow: "hidden" }}>
                  {sorted.map((task, tIdx) => {
                    const isEditing = editingTaskId === task.id;
                    return (
                      <div key={task.id} style={{ padding: "12px 16px", borderBottom: tIdx < sorted.length - 1 ? "1px solid #f0f0f0" : "none", background: task.completed ? "#FAFBFC" : "transparent" }}>
                        {isEditing ? (
                          <div>
                            <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 160px 100px", gap: 10, marginBottom: 8 }}>
                              <div><label style={{ fontSize: 11, color: "#666" }}>Task</label><input value={editTask.title} onChange={e => setEditTask(p => ({ ...p, title: e.target.value }))} style={inputStyle} /></div>
                              <div style={isMobile ? { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 } : {}}><div><label style={{ fontSize: 11, color: "#666" }}>Date</label><input type="date" value={editTask.date} onChange={e => setEditTask(p => ({ ...p, date: e.target.value }))} style={inputStyle} /></div>
                              {isMobile && <div><label style={{ fontSize: 11, color: "#666" }}>Priority</label><select value={editTask.priority || 2} onChange={e => setEditTask(p => ({ ...p, priority: Number(e.target.value) }))} style={inputStyle}><option value={1}>1 - High</option><option value={2}>2 - Medium</option><option value={3}>3 - Low</option></select></div>}</div>
                              {!isMobile && <div><label style={{ fontSize: 11, color: "#666" }}>Priority</label><select value={editTask.priority || 2} onChange={e => setEditTask(p => ({ ...p, priority: Number(e.target.value) }))} style={inputStyle}><option value={1}>1 - High</option><option value={2}>2 - Medium</option><option value={3}>3 - Low</option></select></div>}
                            </div>
                            <div style={{ marginBottom: 10 }}><label style={{ fontSize: 11, color: "#666" }}>Notes</label><textarea value={editTask.notes} onChange={e => setEditTask(p => ({ ...p, notes: e.target.value }))} rows={2} style={{ ...inputStyle, resize: "vertical" }} /></div>
                            <div style={{ display: "flex", gap: 8 }}>
                              <button onClick={saveTaskEdit} style={{ padding: "6px 14px", fontSize: 12, background: "#2196F3", color: "#fff", border: "none", borderRadius: 4, cursor: "pointer", fontWeight: 600 }}>Save</button>
                              <button onClick={() => { setEditingTaskId(null); setEditTask({}); }} style={{ padding: "6px 14px", fontSize: 12, background: "#fff", color: "#666", border: "1px solid #ddd", borderRadius: 4, cursor: "pointer" }}>Cancel</button>
                            </div>
                          </div>
                        ) : (
                          <div style={{ display: "flex", alignItems: "flex-start", gap: isMobile ? 8 : 12 }}>
                            <div onClick={() => toggleComplete(task.id)} style={{ width: 22, height: 22, borderRadius: 6, border: `2px solid ${task.completed ? "#4CAF50" : "#ccc"}`, background: task.completed ? "#4CAF50" : "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1, transition: "all 0.15s" }}>
                              {task.completed && <span style={{ color: "#fff", fontSize: 14, lineHeight: 1 }}>&#10003;</span>}
                            </div>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                                {(task.priority || 2) !== 2 && <span style={{ fontSize: 10, fontWeight: 700, padding: "1px 6px", borderRadius: 4, color: "#fff", background: task.priority === 1 ? "#C62828" : "#9E9E9E", flexShrink: 0 }}>{task.priority === 1 ? "HIGH" : "LOW"}</span>}
                                <span style={{ fontSize: isMobile ? 13 : 14, fontWeight: 500, color: task.completed ? "#999" : "#1a1a2e", textDecoration: task.completed ? "line-through" : "none" }}>{task.title}</span>
                                {task.prospectId && getProspectName(task.prospectId) && <span style={{ fontSize: 10, fontWeight: 600, color: "#7C3AED", background: "#EDE9FE", borderRadius: 4, padding: "1px 6px" }}>{getProspectName(task.prospectId)}</span>}
                                {!task.completed && task.date < today && <span style={{ fontSize: 10, color: "#F57F17", background: "#FFF8E1", padding: "1px 6px", borderRadius: 4, fontWeight: 500 }}>from {toDisplay(task.date)}</span>}
                              </div>
                              {task.notes && <div style={{ fontSize: 12, color: task.completed ? "#bbb" : "#777", marginTop: 3 }}>{task.notes}</div>}
                              {task.completed && task.completedAt && <div style={{ fontSize: 11, color: "#bbb", marginTop: 3 }}>Completed {task.completedAt}</div>}
                              {isMobile && <div style={{ display: "flex", gap: 6, marginTop: 6 }}>
                                <button onClick={() => { setEditingTaskId(task.id); setEditTask({ title: task.title, date: task.date, notes: task.notes, priority: task.priority || 2 }); }} style={{ padding: "4px 10px", fontSize: 11, background: "#fff", border: "1px solid #ddd", borderRadius: 4, cursor: "pointer", color: "#555" }}>Edit</button>
                                {confirmDeleteTask === task.id ? (
                                  <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                                    <button onClick={() => deleteTask(task.id)} style={{ padding: "4px 10px", fontSize: 11, background: "#C62828", color: "#fff", border: "none", borderRadius: 4, cursor: "pointer", fontWeight: 600 }}>Delete</button>
                                    <button onClick={() => setConfirmDeleteTask(null)} style={{ padding: "4px 8px", fontSize: 11, background: "#fff", color: "#666", border: "1px solid #ddd", borderRadius: 4, cursor: "pointer" }}>No</button>
                                  </div>
                                ) : (
                                  <button onClick={() => setConfirmDeleteTask(task.id)} style={{ padding: "4px 10px", fontSize: 11, background: "#fff", color: "#C62828", border: "1px solid #EF9A9A", borderRadius: 4, cursor: "pointer" }}>Del</button>
                                )}
                              </div>}
                            </div>
                            {!isMobile && <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                              <button onClick={() => { setEditingTaskId(task.id); setEditTask({ title: task.title, date: task.date, notes: task.notes, priority: task.priority || 2 }); }} style={{ padding: "4px 10px", fontSize: 11, background: "#fff", border: "1px solid #ddd", borderRadius: 4, cursor: "pointer", color: "#555" }}>Edit</button>
                              {confirmDeleteTask === task.id ? (
                                <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                                  <button onClick={() => deleteTask(task.id)} style={{ padding: "4px 10px", fontSize: 11, background: "#C62828", color: "#fff", border: "none", borderRadius: 4, cursor: "pointer", fontWeight: 600 }}>Delete</button>
                                  <button onClick={() => setConfirmDeleteTask(null)} style={{ padding: "4px 8px", fontSize: 11, background: "#fff", color: "#666", border: "1px solid #ddd", borderRadius: 4, cursor: "pointer" }}>No</button>
                                </div>
                              ) : (
                                <button onClick={() => setConfirmDeleteTask(task.id)} style={{ padding: "4px 10px", fontSize: 11, background: "#fff", color: "#C62828", border: "1px solid #EF9A9A", borderRadius: 4, cursor: "pointer" }}>Delete</button>
                              )}
                            </div>}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    /* ================================================================
       PROSPECTING PAGE
       ================================================================ */
    function ProspectingPage({ prospects, setProspects, tasks, setTasks, isMobile }) {
      const [showAdd, setShowAdd] = useState(false);
      const [search, setSearch] = useState("");
      const [sectorFilter, setSectorFilter] = useState("All");
      const [expandedId, setExpandedId] = useState(null);
      const [newProspect, setNewProspect] = useState({ name: "", sector: "", address: "", phone: "", contact1: "", contact2: "", email1: "", email2: "", extraContacts: [], notes: [], initialNote: "" });
      const [newNoteText, setNewNoteText] = useState({});
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);
      const [editingId, setEditingId] = useState(null);
      const [editData, setEditData] = useState({});
      const [taskForm, setTaskForm] = useState(null);
      const [sortBy, setSortBy] = useState("name");

      const today = toDateStr(new Date());
      const sectors = [...new Set(prospects.map(p => p.sector).filter(Boolean))].sort();

      const filtered = useMemo(() => {
        let list = prospects;
        if (sectorFilter !== "All") list = list.filter(p => p.sector === sectorFilter);
        if (search) list = list.filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || p.contact1.toLowerCase().includes(search.toLowerCase()) || p.contact2.toLowerCase().includes(search.toLowerCase()));
        return [...list].sort((a, b) => {
          if (sortBy === "name") return a.name.localeCompare(b.name);
          if (sortBy === "contact") return (a.contact1||"").localeCompare(b.contact1||"");
          if (sortBy === "sector") return (a.sector||"").localeCompare(b.sector||"") || a.name.localeCompare(b.name);
          if (sortBy === "notes") return (b.notes?.length||0) - (a.notes?.length||0);
          if (sortBy === "recent") { const aDate = a.lastContacted||""; const bDate = b.lastContacted||""; if (!aDate && !bDate) return 0; if (!aDate) return 1; if (!bDate) return -1; return bDate.localeCompare(aDate); }
          return 0;
        });
      }, [prospects, sectorFilter, search, sortBy]);

      const stats = useMemo(() => {
        const thisMonth = new Date();
        thisMonth.setDate(1);
        const contacted = prospects.filter(p => p.lastContacted && new Date(p.lastContacted) >= thisMonth).length;
        return {
          total: prospects.length,
          withNotes: prospects.filter(p => p.notes && p.notes.length > 0).length,
          contactedThisMonth: contacted,
          sectors: sectors.length
        };
      }, [prospects, sectors]);

      const addProspect = () => {
        if (!newProspect.name.trim()) return;
        const id = prospects.length > 0 ? Math.max(...prospects.map(p => p.id)) + 1 : 1;
        const initialNotes = newProspect.initialNote && newProspect.initialNote.trim() ? [{ id: Date.now(), text: newProspect.initialNote.trim(), date: today, timestamp: new Date().toLocaleString() }] : [];
        const { initialNote, ...prospectData } = newProspect;
        setProspects(prev => [...prev, { ...prospectData, id, extraContacts: newProspect.extraContacts || [], notes: initialNotes, lastContacted: initialNotes.length > 0 ? today : null }]);
        setNewProspect({ name: "", sector: "", address: "", phone: "", contact1: "", contact2: "", email1: "", email2: "", extraContacts: [], notes: [], initialNote: "" });
        setShowAdd(false);
      };

      const addNote = (prospectId, text) => {
        if (!text.trim()) return;
        const now = new Date();
        setProspects(prev => prev.map(p => p.id === prospectId ? {
          ...p,
          notes: [{ id: Date.now(), text, date: today, timestamp: now.toLocaleString() }, ...p.notes]
        } : p));
        setNewNoteText(prev => ({ ...prev, [prospectId]: "" }));
      };

      const deleteNote = (prospectId, noteId) => {
        setProspects(prev => prev.map(p => p.id === prospectId ? { ...p, notes: p.notes.filter(n => n.id !== noteId) } : p));
      };

      const openTaskForm = (prospectId) => {
        const prospect = prospects.find(p => p.id === prospectId);
        setTaskForm({ prospectId, title: `Follow up: ${prospect.name}`, date: today, notes: `Follow up with ${prospect.name}` });
      };

      const submitTaskForm = () => {
        if (!taskForm || !taskForm.title.trim()) return;
        const id = tasks.length > 0 ? Math.max(...tasks.map(t => t.id)) + 1 : 1;
        setTasks(prev => [...prev, { id, title: taskForm.title, date: taskForm.date, notes: taskForm.notes || "", completed: false, completedAt: null, prospectId: taskForm.prospectId || null }]);
        setProspects(prev => prev.map(p => p.id === taskForm.prospectId ? { ...p, lastContacted: today } : p));
        setTaskForm(null);
      };

      const startEdit = (prospect) => { setEditingId(prospect.id); setEditData({ ...prospect }); };

      const saveEdit = () => {
        setProspects(prev => prev.map(p => p.id === editingId ? { ...p, ...editData } : p));
        setEditingId(null); setEditData({});
      };

      const deleteProspect = (id) => {
        setProspects(prev => prev.filter(p => p.id !== id));
        setConfirmDeleteId(null);
        setExpandedId(null);
      };

      return (
        <div>
          {/* Stats */}
          <div style={{ display: "grid", gridTemplateColumns: isMobile ? "repeat(2, 1fr)" : "repeat(4, 1fr)", gap: isMobile ? 8 : 12, marginBottom: isMobile ? 12 : 20 }}>
            <div style={{ padding: isMobile ? "10px 12px" : "14px 16px", borderRadius: 10, background: "#fff", border: "1.5px solid #E0E0E0" }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "#999", marginBottom: 2 }}>Prospects</div>
              <div style={{ fontSize: isMobile ? 18 : 22, fontWeight: 700, color: "#5B21B6" }}>{stats.total}</div>
            </div>
            <div style={{ padding: isMobile ? "10px 12px" : "14px 16px", borderRadius: 10, background: "#fff", border: "1.5px solid #E0E0E0" }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "#999", marginBottom: 2 }}>With Notes</div>
              <div style={{ fontSize: isMobile ? 18 : 22, fontWeight: 700, color: "#5B21B6" }}>{stats.withNotes}</div>
            </div>
            <div style={{ padding: isMobile ? "10px 12px" : "14px 16px", borderRadius: 10, background: "#fff", border: "1.5px solid #E0E0E0" }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "#999", marginBottom: 2 }}>This Month</div>
              <div style={{ fontSize: isMobile ? 18 : 22, fontWeight: 700, color: "#5B21B6" }}>{stats.contactedThisMonth}</div>
            </div>
            <div style={{ padding: isMobile ? "10px 12px" : "14px 16px", borderRadius: 10, background: "#fff", border: "1.5px solid #E0E0E0" }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "#999", marginBottom: 2 }}>Sectors</div>
              <div style={{ fontSize: isMobile ? 18 : 22, fontWeight: 700, color: "#5B21B6" }}>{stats.sectors}</div>
            </div>
          </div>

          {/* Controls */}
          <div style={{ display: "flex", gap: isMobile ? 6 : 10, marginBottom: isMobile ? 10 : 16, alignItems: "center", flexWrap: "wrap" }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search..." style={{ ...inputStyle, width: isMobile ? "100%" : 240, padding: "8px 12px" }} />
            <select value={sectorFilter} onChange={e => setSectorFilter(e.target.value)} style={{ ...inputStyle, width: isMobile ? "auto" : 150, padding: "8px 12px", flex: isMobile ? 1 : "none" }}>
              <option value="All">All Sectors</option>
              {sectors.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{ ...inputStyle, width: isMobile ? "auto" : 170, padding: "8px 12px", flex: isMobile ? 1 : "none" }}>
              <option value="name">Sort: Name</option>
              <option value="contact">Sort: Contact</option>
              <option value="sector">Sort: Sector</option>
              <option value="notes">Sort: Notes</option>
              <option value="recent">Sort: Recent</option>
            </select>
            {!isMobile && <div style={{ flex: 1 }} />}
            <button onClick={() => setShowAdd(!showAdd)} style={{ padding: "8px 16px", background: "#7C3AED", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: 600, width: isMobile ? "100%" : "auto" }}>+ Add Prospect</button>
          </div>

          {/* Add Prospect Form */}
          {showAdd && (
            <div style={{ background: "#fff", border: "2px solid #7C3AED", borderRadius: 10, padding: 20, marginBottom: 16 }}>
              <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 12, color: "#5B21B6" }}>New Prospect</div>
              <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr 1fr", gap: 10, marginBottom: 10 }}>
                <div><label style={{ fontSize: 11, color: "#666" }}>Name</label><input value={newProspect.name} onChange={e => setNewProspect(p => ({ ...p, name: e.target.value }))} placeholder="Prospect name" style={inputStyle} /></div>
                <div><label style={{ fontSize: 11, color: "#666" }}>Sector</label><input value={newProspect.sector} onChange={e => setNewProspect(p => ({ ...p, sector: e.target.value }))} placeholder="e.g., K-12, Municipal" style={inputStyle} /></div>
